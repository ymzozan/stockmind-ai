# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

name = "Mind Preorder, Back In Stock"
client_id = "c0eb3b492c6061fc1855fdb869dc33f5"
application_url = "https://stockmind-ai-jade.vercel.app"
embedded = true

[build]
automatically_update_urls_on_dev = true
dev_store_url = ""

[access_scopes]
scopes = "write_products,read_orders,write_orders,read_inventory,write_inventory,read_customers,write_customers"

[auth]
redirect_urls = [
  "https://stockmind-ai-jade.vercel.app/auth/callback",
  "https://stockmind-ai-jade.vercel.app/auth/shopify/callback",
  "https://stockmind-ai-jade.vercel.app/api/auth/callback",
]

[webhooks]
api_version = "2025-04"

  [[webhooks.subscriptions]]
  topics = ["orders/create", "orders/fulfilled", "orders/cancelled"]
  uri = "/webhooks"

  [[webhooks.subscriptions]]
  topics = ["products/update"]
  uri = "/webhooks"

  [[webhooks.subscriptions]]
  topics = ["inventory_levels/update"]
  uri = "/webhooks"

  [[webhooks.subscriptions]]
  topics = ["app/uninstalled"]
  uri = "/webhooks"

  # GDPR mandatory — required for App Store approval
  [[webhooks.subscriptions]]
  topics = ["customers/data_request", "customers/redact", "shop/redact"]
  uri = "/webhooks"

[pos]
embedded = false
